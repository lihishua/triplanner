name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js << 'ENDOFFILE'
          window.TRIPLANNER_CONFIG = {
            SUPABASE_URL: "SUPABASE_URL_PLACEHOLDER",
            SUPABASE_ANON_KEY: "SUPABASE_ANON_KEY_PLACEHOLDER",
            MAPBOX_TOKEN: "MAPBOX_TOKEN_PLACEHOLDER",
          };
          ENDOFFILE
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" config.js
          sed -i "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" config.js
          sed -i "s|MAPBOX_TOKEN_PLACEHOLDER|${{ secrets.MAPBOX_TOKEN }}|g" config.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
