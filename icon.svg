<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c"><circle cx="256" cy="272" r="152"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7f6d"/>
      <stop offset="100%" stop-color="#355f50"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="108" fill="none"
    stroke="#ffffff" stroke-width="3" opacity="0.08"/>

  <!-- Globe grid clipped to sphere -->
  <g clip-path="url(#c)" opacity="0.38">
    <line x1="104" y1="204" x2="408" y2="204" stroke="#c2924a" stroke-width="5"/>
    <line x1="104" y1="272" x2="408" y2="272" stroke="#c2924a" stroke-width="5"/>
    <line x1="104" y1="340" x2="408" y2="340" stroke="#c2924a" stroke-width="5"/>
    <line x1="180" y1="120" x2="180" y2="424" stroke="#c2924a" stroke-width="5"/>
    <line x1="256" y1="120" x2="256" y2="424" stroke="#c2924a" stroke-width="5"/>
    <line x1="332" y1="120" x2="332" y2="424" stroke="#c2924a" stroke-width="5"/>
  </g>

  <!-- Globe circle -->
  <circle cx="256" cy="272" r="152" fill="none"
    stroke="#c2924a" stroke-width="10" opacity="0.88"/>

  <!-- Flight arc (dashed) -->
  <path d="M 155 348 Q 230 148 358 205"
    fill="none" stroke="#c2924a" stroke-width="7.5"
    stroke-dasharray="16 11" stroke-linecap="round" opacity="0.9"/>

  <!-- Origin dot -->
  <circle cx="155" cy="348" r="13" fill="#c2924a" opacity="0.75"/>

  <!-- Destination pin (solid ring) -->
  <circle cx="358" cy="205" r="22" fill="#c2924a"/>
  <circle cx="358" cy="205" r="10" fill="#f5f0e8"/>

  <!-- Signature gold dot (top, matches app header) -->
  <circle cx="256" cy="88" r="18" fill="#c2924a"/>
</svg>
