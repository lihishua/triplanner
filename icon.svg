<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c"><circle cx="256" cy="268" r="154"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7f6d"/>
      <stop offset="100%" stop-color="#345e4f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="none"
    stroke="#ffffff" stroke-width="3" opacity="0.07"/>

  <!-- Globe grid (clipped) -->
  <g clip-path="url(#c)" opacity="0.32">
    <line x1="102" y1="200" x2="410" y2="200" stroke="#c2924a" stroke-width="5"/>
    <line x1="102" y1="268" x2="410" y2="268" stroke="#c2924a" stroke-width="5"/>
    <line x1="102" y1="336" x2="410" y2="336" stroke="#c2924a" stroke-width="5"/>
    <line x1="178" y1="114" x2="178" y2="422" stroke="#c2924a" stroke-width="5"/>
    <line x1="256" y1="114" x2="256" y2="422" stroke="#c2924a" stroke-width="5"/>
    <line x1="334" y1="114" x2="334" y2="422" stroke="#c2924a" stroke-width="5"/>
  </g>

  <!-- Globe outline -->
  <circle cx="256" cy="268" r="154" fill="none"
    stroke="#c2924a" stroke-width="10" opacity="0.85"/>

  <!-- Arc 1: Origin → Stopover -->
  <path d="M 162 348 Q 210 168 302 224"
    fill="none" stroke="#c2924a" stroke-width="7.5"
    stroke-dasharray="15 10" stroke-linecap="round" opacity="0.88"/>

  <!-- Arc 2: Stopover → Destination -->
  <path d="M 302 224 Q 338 178 372 188"
    fill="none" stroke="#c2924a" stroke-width="7.5"
    stroke-dasharray="15 10" stroke-linecap="round" opacity="0.88"/>

  <!-- Origin: small filled dot -->
  <circle cx="162" cy="348" r="12" fill="#c2924a" opacity="0.75"/>

  <!-- Stopover: medium dot with ring -->
  <circle cx="302" cy="224" r="20" fill="#c2924a" opacity="0.92"/>
  <circle cx="302" cy="224" r="9" fill="#f5f0e8"/>

  <!-- Destination: larger pin -->
  <circle cx="372" cy="188" r="26" fill="#c2924a"/>
  <circle cx="372" cy="188" r="12" fill="#f5f0e8"/>
</svg>
